name: CI

# Three-layer validation that runs on every push to main and every PR:
#
#   1. rust-checks (single job) — cargo fmt --check, cargo clippy, cargo test.
#      Fast static signal; gates the heavier matrix.
#   2. php-unit (2 jobs)        — pure PHP unit tests against the fake client,
#      no native extension required. Catches Composer-layer regressions.
#   3. native + musl matrices   — build the extension and smoke-test that it
#      loads. Native covers linux-gnu and macOS across all 5 PHP versions;
#      musl covers only PHP 8.1 + 8.5 (cheap regression net for the Alpine
#      toolchain — full musl matrix runs in release.yml).
#
# Windows is intentionally absent from the matrix: PHP for Windows is built
# with a pinned MSVC toolset (14.29 for 8.1-8.3, 14.40+ for 8.4-8.5), and
# matching the runtime MSVC of Rust + bindgen + boring-sys + the chocolatey
# LLVM that bindgen needs has proven too fragile for CI. README directs
# Windows users to `cargo build --release`.
#
# Integration tests (the `@group integration` group in tests/) intentionally
# do not run here yet: they currently depend on the public httpbin.org and have
# been non-blocking historically. They will be re-enabled once a local HTTP
# fixture is added.

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**.md', 'LICENSE', '.gitignore']

permissions:
  contents: write

# Cancel superseded PR runs to save runners; keep main runs serial so every
# pushed commit gets validated.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  COMPOSER_NO_INTERACTION: '1'
  COMPOSER_NO_AUDIT: '1'

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-checks

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --no-fail-fast

      # IDE stubs are committed at src-php/Wreq.stubs.php and shipped via
      # Composer. CI regenerates them from the registered Rust classes and:
      #   - on a push to main, commits a refresh back automatically with
      #     `[skip ci]` so the follow-up push does not loop;
      #   - on a PR, fails the run — fork PRs cannot push back, and a stale
      #     stub in a PR should be made visible to the author.
      - name: Cache cargo-php binary
        id: cache-cargo-php
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-php
          key: cargo-php-${{ runner.os }}-v0.1.21

      - name: Install cargo-php
        if: steps.cache-cargo-php.outputs.cache-hit != 'true'
        run: cargo install cargo-php --locked --version 0.1.21

      - name: Regenerate IDE stubs
        run: cargo php stubs --manifest Cargo.toml --out src-php/Wreq.stubs.php

      - name: Auto-commit stub refresh on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- src-php/Wreq.stubs.php; then
            echo "Stubs are up to date."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src-php/Wreq.stubs.php
          git commit -m 'chore: regenerate IDE stubs [skip ci] [skip release]'
          git push

      - name: Fail PR if stubs are stale
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --exit-code -- src-php/Wreq.stubs.php; then
            echo "::error::src-php/Wreq.stubs.php is out of date."
            echo "Run: cargo php stubs --manifest Cargo.toml --out src-php/Wreq.stubs.php"
            exit 1
          fi

  php-unit:
    name: PHP unit (php ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.5']
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: composer validate
        run: composer validate --strict --no-check-publish

      # --no-scripts skips the Wreq\Installer post-install hook so we don't
      # waste a download attempt against a non-existent release.
      - name: composer install
        run: composer install --no-progress --no-scripts

      - name: phpunit
        run: vendor/bin/phpunit --no-coverage --exclude-group integration

  native:
    name: ${{ matrix.platform.target_os }}-${{ matrix.platform.arch }} · php ${{ matrix.php }}
    needs: [rust-checks, php-unit]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        platform:
          - { target_os: linux-gnu, arch: x86_64,  runner: ubuntu-latest,    ext: so }
          - { target_os: linux-gnu, arch: aarch64, runner: ubuntu-24.04-arm, ext: so }
          - { target_os: macos,     arch: aarch64, runner: macos-14,         ext: so }
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Scope the cache by PHP version and platform — Swatinem/rust-cache only
      # splits by OS, so all 5 PHP jobs on a given runner would otherwise share
      # one cache and overwrite each other's libwreq_php.{so,dylib}, producing
      # binaries that mismatch the runtime PHP and fail the smoke test with
      # "Module compiled with module API=…".
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: v2-php${{ matrix.php }}-${{ matrix.platform.target_os }}-${{ matrix.platform.arch }}

      - name: cargo build
        run: cargo build --release

      # Block scalar (`run: |`) is required — the PHP ternary contains `: 1`
      # which a plain YAML scalar would parse as a mapping separator.
      - name: Smoke test
        run: |
          SRC=$(find target/release -maxdepth 1 \( -name 'libwreq_php.dylib' -o -name 'libwreq_php.so' \) | head -n1)
          test -n "$SRC" || { echo "build artifact not found"; exit 1; }
          php -d extension="$PWD/$SRC" -r 'exit(class_exists("Wreq\\Ext\\Client") ? 0 : 1);'

  musl:
    name: linux-musl · php ${{ matrix.php }}
    needs: [rust-checks, php-unit]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # CI exercises only the extremes of the supported PHP range under musl —
        # enough to catch Alpine/musl toolchain regressions without multiplying
        # Docker-backed jobs. release.yml builds the full PHP × arch matrix.
        php: ['8.1', '8.5']
    steps:
      - uses: actions/checkout@v6

      # The runner stays on Ubuntu; only scripts/ci/musl-build.sh runs inside
      # Alpine via `docker run`. `test` mode does build + smoke load + phpunit
      # unit suite — any failure aborts the job.
      - name: Build and test in Alpine
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            php:${{ matrix.php }}-cli-alpine \
            sh scripts/ci/musl-build.sh test

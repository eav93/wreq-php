name: Auto release

# Every commit to `main` cuts a new release: a `v*` tag is created and the
# binary release workflow runs for it.
#
# Version bump (from the latest tag):
#   * default          — patch:  v0.1.3 -> v0.1.4
#   * `[minor]` in msg — minor:  v0.1.3 -> v0.2.0
#   * `[major]` in msg — major:  v0.1.3 -> v1.0.0
#
# Skip a commit entirely with `[skip release]`; documentation-only commits are
# ignored via paths-ignore.
#
# The tag is pushed with GITHUB_TOKEN, which by design does not trigger the
# `push: tags` workflow — so the release workflow is invoked directly here as
# a reusable workflow instead.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: autorelease
  cancel-in-progress: false

jobs:
  version:
    name: Bump minor version
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute and push next tag
        id: bump
        run: |
          latest=$(git tag -l 'v*' --sort=-version:refname | head -n1)
          message=$(git log -1 --pretty=%B)

          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            version=${latest#v}
            major=${version%%.*}
            rest=${version#*.}
            minor=${rest%%.*}
            patch=${rest#*.}
            case "$message" in
              *"[major]"*) next="v$((major + 1)).0.0" ;;
              *"[minor]"*) next="v${major}.$((minor + 1)).0" ;;
              *)           next="v${major}.${minor}.$((patch + 1))" ;;
            esac
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
          git tag "$next"
          git push origin "$next"
          echo "Tagged $next"

  release:
    needs: version
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.version.outputs.tag }}
    secrets: inherit

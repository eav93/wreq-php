name: Release

# Builds one prebuilt extension binary per (PHP version × OS × arch) and
# attaches them to the GitHub Release. The Composer installer downloads the
# asset matching the user's environment from `releases/latest/download/`.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} · php ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        include:
          - os: ubuntu-latest
            target_os: linux
            arch: x86_64
            ext: so
          - os: macos-14
            target_os: macos
            arch: aarch64
            ext: so
          - os: macos-13
            target_os: macos
            arch: x86_64
            ext: so
          - os: windows-latest
            target_os: windows
            arch: x86_64
            ext: dll

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          SRC=$(ls target/release/wreq_php.dll target/release/libwreq_php.dylib target/release/libwreq_php.so 2>/dev/null | head -n1)
          NAME="wreq_php-php${{ matrix.php }}-nts-${{ matrix.target_os }}-${{ matrix.arch }}.${{ matrix.ext }}"
          cp "$SRC" "dist/$NAME"
          ( cd dist && shasum -a 256 "$NAME" > "$NAME.sha256" )

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*

name: Release

# Builds one prebuilt extension binary per (PHP version × OS/libc × arch),
# smoke-tests each, and attaches the full set to the GitHub Release.
#
# Trigger: pushed `v*` tag, manual dispatch, or `workflow_call` from
# autorelease.yml. CI validation (lint, unit, smoke) happens in ci.yml before
# changes reach a tagged commit — this workflow is the publish path.
#
# Each matrix job uploads its .so/.sha256 as a workflow artifact; a single
# `publish` job aggregates the artifacts and attaches them in one API call.
# Direct per-job uploads to the release race against ~30 parallel callers and
# silently drop assets even when every job reports success.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and release
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: Tag to build and release
        required: true
        type: string

permissions:
  contents: write

env:
  REF: ${{ inputs.tag || github.ref_name }}

jobs:
  native:
    name: ${{ matrix.platform.target_os }}-${{ matrix.platform.arch }} · php ${{ matrix.php }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        platform:
          - { target_os: linux-gnu, arch: x86_64,  runner: ubuntu-latest,    ext: so }
          - { target_os: linux-gnu, arch: aarch64, runner: ubuntu-24.04-arm, ext: so }
          - { target_os: macos,     arch: aarch64, runner: macos-14,         ext: so }
          - { target_os: windows,   arch: x86_64,  runner: windows-2022,     ext: dll }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.REF }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.platform.target_os == 'windows' && 'nightly' || 'stable' }}

      # PHP 8.1-8.3 Windows binaries are built with VS16 / MSVC 14.29. A
      # Windows extension built with the newer default VS2022 toolset fails to
      # load with "linked with 14.xx, but the core is linked with 14.29".
      - name: Set up MSVC 14.29 for VS16 PHP
        if: ${{ matrix.platform.target_os == 'windows' && contains(fromJSON('["8.1","8.2","8.3"]'), matrix.php) }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.29

      - name: Set up default MSVC for VS17 PHP
        if: ${{ matrix.platform.target_os == 'windows' && !contains(fromJSON('["8.1","8.2","8.3"]'), matrix.php) }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # BoringSSL's Windows build needs NASM. Use Ninja so cmake-rs respects
      # the cl.exe selected above instead of rediscovering the default Visual
      # Studio generator/toolset.
      - name: Set up Windows native build deps
        if: ${{ matrix.platform.target_os == 'windows' }}
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BINDGEN_EXTRA_CLANG_ARGS=--target=x86_64-pc-windows-msvc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (Test-Path "C:\Program Files\LLVM\bin\libclang.dll") {
            "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      # Scope the cache by PHP version × platform — Swatinem/rust-cache splits
      # only by OS, and a single shared cache otherwise lets the first job
      # populate target/release/libwreq_php.* and the rest reuse a binary
      # built against a different PHP module API.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: v2-php${{ matrix.php }}-${{ matrix.platform.target_os }}-${{ matrix.platform.arch }}

      - name: cargo build
        env:
          # Baked into the binary and reported by Wreq\Ext\Client::extensionVersion().
          WREQ_PHP_VERSION: ${{ env.REF }}
        run: cargo build --release

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          SRC=$(find target/release -maxdepth 1 \( -name 'wreq_php.dll' -o -name 'libwreq_php.dylib' -o -name 'libwreq_php.so' \) | head -n1)
          test -n "$SRC" || { echo "build artifact not found"; exit 1; }
          NAME="wreq_php-php${{ matrix.php }}-nts-${{ matrix.platform.target_os }}-${{ matrix.platform.arch }}.${{ matrix.platform.ext }}"
          cp "$SRC" "dist/$NAME"
          ( cd dist && { command -v sha256sum >/dev/null 2>&1 && sha256sum "$NAME" || shasum -a 256 "$NAME"; } > "$NAME.sha256" )
          echo "BINARY=$PWD/dist/$NAME" >> "$GITHUB_ENV"

      # Block scalar (`run: |`) — the PHP ternary `? 0 : 1` would otherwise be
      # parsed as a YAML mapping.
      - name: Smoke test
        shell: bash
        run: |
          php -d extension="$BINARY" -r 'exit(class_exists("Wreq\\Ext\\Client") ? 0 : 1);'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform.target_os }}-${{ matrix.platform.arch }}-php${{ matrix.php }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  musl:
    name: linux-musl-${{ matrix.arch }} · php ${{ matrix.php }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        arch: [x86_64, aarch64]
        include:
          - { arch: x86_64,  runner: ubuntu-latest }
          - { arch: aarch64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.REF }}

      # The runner stays on Ubuntu; only scripts/ci/musl-build.sh runs inside
      # Alpine via `docker run`. The script's smoke step aborts the job if
      # the freshly built .so cannot dlopen under musl.
      - name: Build in Alpine
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e WREQ_PHP_VERSION="${{ env.REF }}" \
            php:${{ matrix.php }}-cli-alpine \
            sh scripts/ci/musl-build.sh build

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          NAME="wreq_php-php${{ matrix.php }}-nts-linux-musl-${{ matrix.arch }}.so"
          cp target/release/libwreq_php.so "dist/$NAME"
          ( cd dist && sha256sum "$NAME" > "$NAME.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-linux-musl-${{ matrix.arch }}-php${{ matrix.php }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to release
    needs: [native, musl]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*

name: Release

# Builds one prebuilt extension binary per (PHP version × OS/libc × arch) and
# attaches them to the GitHub Release. The Composer installer downloads the
# asset matching the user's environment.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Native builds on the GitHub runners: glibc Linux, macOS, Windows.
  native:
    name: ${{ matrix.target_os }} · php ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        include:
          - os: ubuntu-latest
            target_os: linux-gnu
            arch: x86_64
            ext: so
          - os: macos-14
            target_os: macos
            arch: aarch64
            ext: so
          - os: macos-13
            target_os: macos
            arch: x86_64
            ext: so
          - os: windows-latest
            target_os: windows
            arch: x86_64
            ext: dll

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          SRC=$(find target/release -maxdepth 1 \( -name 'wreq_php.dll' -o -name 'libwreq_php.dylib' -o -name 'libwreq_php.so' \) | head -n1)
          test -n "$SRC" || { echo "build artifact not found"; exit 1; }
          NAME="wreq_php-php${{ matrix.php }}-nts-${{ matrix.target_os }}-${{ matrix.arch }}.${{ matrix.ext }}"
          cp "$SRC" "dist/$NAME"
          ( cd dist && shasum -a 256 "$NAME" > "$NAME.sha256" )

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*

  # musl builds inside Alpine PHP images, for Alpine-based deployments.
  musl:
    name: linux-musl · php ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Build in Alpine
        run: |
          docker build -f docker/Dockerfile \
            --build-arg PHP_VERSION=${{ matrix.php }} \
            --target artifact --output type=local,dest=docker-out .

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          NAME="wreq_php-php${{ matrix.php }}-nts-linux-musl-x86_64.so"
          cp docker-out/libwreq_php.so "dist/$NAME"
          ( cd dist && shasum -a 256 "$NAME" > "$NAME.sha256" )

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*

name: Release

# Builds one prebuilt extension binary per (PHP version × OS/libc × arch) and
# attaches them to the GitHub Release. Runs on a pushed `v*` tag, on manual
# dispatch, or when called by the auto-release workflow.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and release
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: Tag to build and release
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Native builds on the GitHub runners: glibc Linux (x86_64 + arm64),
  # macOS (Apple Silicon), Windows. Intel macOS is omitted — GitHub is
  # retiring its free Intel runners and `macos-13` jobs no longer get picked
  # up; Intel Mac users can build from source.
  native:
    name: ${{ matrix.target_os }}-${{ matrix.arch }} · php ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
        include:
          - { os: ubuntu-latest,    target_os: linux-gnu, arch: x86_64,  ext: so }
          - { os: ubuntu-24.04-arm, target_os: linux-gnu, arch: aarch64, ext: so }
          - { os: macos-14,         target_os: macos,     arch: aarch64, ext: so }
          - { os: windows-latest,   target_os: windows,   arch: x86_64,  ext: dll }

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      # ext-php-rs needs the nightly `abi_vectorcall` feature on Windows;
      # stable is fine on Linux and macOS.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.os == 'windows-latest' && 'nightly' || 'stable' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          SRC=$(find target/release -maxdepth 1 \( -name 'wreq_php.dll' -o -name 'libwreq_php.dylib' -o -name 'libwreq_php.so' \) | head -n1)
          test -n "$SRC" || { echo "build artifact not found"; exit 1; }
          NAME="wreq_php-php${{ matrix.php }}-nts-${{ matrix.target_os }}-${{ matrix.arch }}.${{ matrix.ext }}"
          cp "$SRC" "dist/$NAME"
          # shasum is absent on Windows runners; sha256sum covers Linux and
          # Windows, with shasum as the macOS fallback.
          ( cd dist && { command -v sha256sum >/dev/null 2>&1 && sha256sum "$NAME" || shasum -a 256 "$NAME"; } > "$NAME.sha256" )

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*

  # musl builds inside Alpine PHP images, on native runners per arch.
  musl:
    name: linux-musl-${{ matrix.arch }} · php ${{ matrix.php }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        arch: [x86_64, aarch64]
        include:
          - { arch: x86_64,  runner: ubuntu-latest }
          - { arch: aarch64, runner: ubuntu-24.04-arm }

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Build in Alpine
        run: |
          docker build -f docker/Dockerfile.alpine \
            --build-arg PHP_VERSION=${{ matrix.php }} \
            --target artifact --output type=local,dest=docker-out .

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          NAME="wreq_php-php${{ matrix.php }}-nts-linux-musl-${{ matrix.arch }}.so"
          cp docker-out/libwreq_php.so "dist/$NAME"
          # shasum is absent on Windows runners; sha256sum covers Linux and
          # Windows, with shasum as the macOS fallback.
          ( cd dist && { command -v sha256sum >/dev/null 2>&1 && sha256sum "$NAME" || shasum -a 256 "$NAME"; } > "$NAME.sha256" )

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*

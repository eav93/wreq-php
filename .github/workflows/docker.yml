name: Docker images

# Builds ready-to-use PHP images with the wreq_php extension already compiled
# in and enabled, and publishes them to the GitHub Container Registry. Use one
# as the base image of a PHP project — no build step on your side.
#
#   FROM ghcr.io/eav93/wreq-php:8.3-cli-alpine

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    name: ghcr · php ${{ matrix.php }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          build-args: PHP_VERSION=${{ matrix.php }}
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ matrix.php }}-cli-alpine
          cache-from: type=gha,scope=php${{ matrix.php }}
          cache-to: type=gha,mode=max,scope=php${{ matrix.php }}

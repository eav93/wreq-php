name: Docker images

# Publishes ready-to-use PHP images with the wreq_php extension already
# compiled in and enabled. They mirror the official `php` image line-up — same
# version/variant matrix, same tag format — so they are drop-in base images.
#
#   FROM ghcr.io/eav93/wreq-php:8.3-cli
#   FROM ghcr.io/eav93/wreq-php:8.3-fpm-alpine
#
# Runs on a pushed `v*` tag, on manual dispatch, or when called by the
# auto-release workflow.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build images from
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: Tag to build images from
        required: true
        type: string

jobs:
  publish:
    name: ghcr · ${{ matrix.php }}-${{ matrix.variant.suffix }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        variant:
          - { suffix: cli,        file: docker/Dockerfile.debian }
          - { suffix: fpm,        file: docker/Dockerfile.debian }
          - { suffix: apache,     file: docker/Dockerfile.debian }
          - { suffix: zts,        file: docker/Dockerfile.debian }
          - { suffix: cli-alpine, file: docker/Dockerfile.alpine }
          - { suffix: fpm-alpine, file: docker/Dockerfile.alpine }
          - { suffix: zts-alpine, file: docker/Dockerfile.alpine }

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.php }}-${{ matrix.variant.suffix }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.variant.file }}
          target: runtime
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            VARIANT=${{ matrix.variant.suffix }}
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ matrix.php }}-${{ matrix.variant.suffix }}
          cache-from: type=gha,scope=${{ matrix.php }}-${{ matrix.variant.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.php }}-${{ matrix.variant.suffix }}

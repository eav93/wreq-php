name: Docker images

# Publishes ready-to-use PHP images with the wreq_php extension already
# enabled. They mirror the official `php` line-up — same version/variant
# matrix, same tag format, multi-arch (amd64 + arm64).
#
#   FROM ghcr.io/eav93/wreq-php:8.3-cli
#   FROM ghcr.io/eav93/wreq-php:8.3-fpm-alpine
#
# The extension is NOT recompiled here — each image is assembled from the
# prebuilt binary already produced by the release workflow, so a build is just
# a download + COPY. That makes one multi-arch buildx run per variant enough
# (no QEMU compilation), and requires the release job to finish first.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build images from
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: Release tag to build images from
        required: true
        type: string

jobs:
  publish:
    name: ghcr · ${{ matrix.php }}-${{ matrix.variant.suffix }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        # NTS variants only — the release builds NTS binaries, and an NTS
        # extension cannot load in a ZTS PHP. ZTS images would need a separate
        # ZTS build pipeline.
        variant:
          - { suffix: cli,        libc: gnu }
          - { suffix: fpm,        libc: gnu }
          - { suffix: apache,     libc: gnu }
          - { suffix: cli-alpine, libc: musl }
          - { suffix: fpm-alpine, libc: musl }

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Download prebuilt extension binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          for arch in x86_64 aarch64; do
            gh release download "${{ inputs.tag }}" \
              --repo "${{ github.repository }}" \
              --pattern "wreq_php-php${{ matrix.php }}-nts-linux-${{ matrix.variant.libc }}-${arch}.so" \
              --output "dist/wreq_php-${arch}.so"
          done

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.php }}-${{ matrix.variant.suffix }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            VARIANT=${{ matrix.variant.suffix }}
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ matrix.php }}-${{ matrix.variant.suffix }}
          provenance: false
          sbom: false
